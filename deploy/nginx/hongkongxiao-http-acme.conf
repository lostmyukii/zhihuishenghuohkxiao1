server {
    listen 80;
    listen [::]:80;
    server_name hongkongxiao.ilelezhan.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:19267;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache" always;
    }
}
